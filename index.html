<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCloud Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        .btn { background: #ff5500; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 18px; margin-top: 10px; cursor: pointer; }
        .secondary { background: #333; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>Шаг 1</h3>
    <a href="https://soundcloud.com/signin" target="_blank"><button class="btn">Войти в SoundCloud</button></a>
    
    <h3>Шаг 2</h3>
    <p>После того как вошли в браузере, вернитесь сюда и нажмите:</p>
    <button class="btn secondary" onclick="sendToken()">Я авторизовался, продолжить</button>

    <script>
        const tg = window.Telegram.WebApp;
        function sendToken() {
            // Пытаемся вытащить токен
            const token = document.cookie.split('; ').find(row => row.startsWith('oauth_token='))?.split('=')[1];
            if (token) {
                tg.sendData(token);
                tg.close();
            } else {
                alert("Ошибка: Токен не найден. Пожалуйста, убедитесь, что вы вошли в аккаунт в открывшемся окне браузера и не закрыли его.");
            }
        }
    </script>
</body>
</html>
